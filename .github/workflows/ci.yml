name: Signal Forge CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          OPENROUTER_API_KEY: test-key-for-ci
        run: |
          pytest tests/ -v --tb=short --cov=engine --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check . --ignore=E501

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UI image
        run: docker build --target ui -t signal-forge-ui .

      - name: Build API image
        run: docker build --target api -t signal-forge-api .

      - name: Verify UI container starts
        run: |
          docker run -d --name ui-test -p 7860:7860 -e OPENROUTER_API_KEY=dummy signal-forge-ui
          sleep 5
          curl -f http://localhost:7860/ || (docker logs ui-test && exit 1)
          docker stop ui-test

      - name: Verify API container starts
        run: |
          docker run -d --name api-test -p 8000:8000 -e OPENROUTER_API_KEY=dummy signal-forge-api
          sleep 5
          curl -f http://localhost:8000/v1/health || (docker logs api-test && exit 1)
          docker stop api-test
